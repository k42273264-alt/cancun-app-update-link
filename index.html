<!doctype html>
<html>
  <head>
    <title>Update App</title>
    <script>
      const ua = navigator.userAgent;

      if (/android/i.test(ua)) {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.prism.ConventionCancun";
      } else if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.href = "https://apps.apple.com/app/id6760333775";
      } else {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.prism.ConventionCancun";
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
