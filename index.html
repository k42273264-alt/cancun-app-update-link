<!doctype html>
<html>
  <head>
    <title>Update App</title>
    <script>
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      // iOS detection
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.href = "https://apps.apple.com/app/id6760333775";
      }
      // Android detection
      else if (/android/i.test(ua)) {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.prism.ConventionCancun";
      }
      // Mac (treat like iOS for testing)
      else if (/Macintosh/i.test(ua)) {
        window.location.href = "https://apps.apple.com/app/id6760333775";
      }
      // fallback
      else {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.prism.ConventionCancun";
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
